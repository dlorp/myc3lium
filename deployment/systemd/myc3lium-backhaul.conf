# Systemd drop-in override for myc3lium.service to allow backhaul operations.
#
# The main service unit uses a hardened sandbox (NoNewPrivileges, ProtectSystem,
# etc.). Several of these directives implicitly set the kernel NoNewPrivileges
# flag, which blocks sudo entirely. Backhaul operations require sudo to call
# myc3lium-netctl for hostapd, iptables, bridge, and wpa_supplicant management.
#
# Install: sudo cp myc3lium-backhaul.conf /etc/systemd/system/myc3lium.service.d/backhaul.conf
#          sudo systemctl daemon-reload && sudo systemctl restart myc3lium
#
# Security notes:
# - CapabilityBoundingSet limits what the process can escalate to
# - sudo is restricted to myc3lium-netctl via /etc/sudoers.d/myc3lium
# - The netctl script validates all interface names and arguments
# - PrivateTmp remains enabled for process isolation

[Service]
NoNewPrivileges=false
ProtectSystem=false
ProtectHome=false
ProtectKernelTunables=false
ProtectKernelModules=false
ProtectControlGroups=false
RestrictSUIDSGID=false
RestrictNamespaces=false
RestrictRealtime=false
LockPersonality=false
PrivateTmp=true
CapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_RAW CAP_SETUID CAP_SETGID CAP_DAC_OVERRIDE
ReadWritePaths=/home/myc3/myc3lium/backend /opt/myc3lium/config /opt/myc3lium/run
