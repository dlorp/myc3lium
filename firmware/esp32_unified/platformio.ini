; MYC3LIUM Unified ESP32-S3 Firmware
; SLIP serial bridge (Core 1) + MJPEG camera server (Core 0)
;
; Target: Heltec ESP32-S3-CAM with OV3660
; Serial: USB CDC at 921600 baud (SLIP transport to Pi)
; Camera: QVGA 320x240 @ 2 FPS over HTTP :8080

[env:esp32_unified]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DBOARD_HAS_PSRAM
    -DCAMERA_MODEL_ESP32S3_CAM
    -DCORE_DEBUG_LEVEL=3
    ; SLIP transport config
    -DSLIP_BAUD=921600
    -DSLIP_MTU=1560
    ; Camera config
    -DCAM_FPS=2
    -DCAM_QUALITY=15
    -DCAM_PORT=8080
    ; Network
    -DESP_IP=\"192.168.1.1\"
    -DPI_IP=\"192.168.1.2\"
    -DPI_PORT=8000

upload_speed = 921600
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
