<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYC3LIUM - P400 Sensor Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'VT323', monospace;
            background: #0B0F14;
            color: #FFFFFF;
            padding: 20px;
            font-size: 20px;
        }
        
        #container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        
        /* CRT scanlines */
        #container::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        header {
            background: rgba(59, 96, 228, 0.2);
            border: 2px solid #3B60E4;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-title {
            color: #50D8D7;
            font-size: 26px;
            letter-spacing: 2px;
        }
        
        .timestamp {
            color: #F4E409;
            font-size: 22px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(11, 15, 20, 0.8);
            border: 2px solid #3B60E4;
        }
        
        th {
            background: rgba(59, 96, 228, 0.3);
            color: #50D8D7;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #3B60E4;
            font-size: 20px;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #636764;
        }
        
        tr:hover {
            background: rgba(80, 216, 215, 0.1);
        }
        
        .node-id {
            color: #F4E409;
            font-size: 18px;
        }
        
        .callsign {
            color: #636764;
            font-size: 16px;
        }
        
        .temp { color: #50D8D7; }
        .humidity { color: #3B60E4; }
        .pressure { color: #FFFFFF; }
        .aqi { color: #50D8D7; }
        
        .status-bar {
            width: 100px;
            height: 20px;
            background: #636764;
            position: relative;
            overflow: hidden;
        }
        
        .status-fill {
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .excellent { background: #50D8D7; }
        .good { background: #3B60E4; }
        .warning { background: #F4E409; }
        .critical { background: #FB8B24; }
        
        .sparkline {
            width: 80px;
            height: 30px;
        }
        
        footer {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(59, 96, 228, 0.2);
            border: 2px solid #3B60E4;
            display: flex;
            justify-content: space-between;
        }
        
        .nav-hint {
            color: #636764;
        }
        
        .nav-key {
            color: #FB8B24;
        }
        
        .alert {
            background: rgba(251, 139, 36, 0.2);
            border-left: 4px solid #FB8B24;
            padding: 10px;
            margin-bottom: 15px;
            color: #FB8B24;
        }
    </style>
</head>
<body>
    <div id="container">
        <header>
            <div class="page-title">┌─ MYC3LIUM ─══─ P400 SENSOR GRID ─══─┐</div>
            <div class="timestamp" id="timestamp">21:52:15</div>
        </header>
        
        <div class="alert" id="alert" style="display: none;">
            ⚠ ALERT: Temperature spike detected at RHIZOME-03
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>NODE</th>
                    <th>TEMP</th>
                    <th>HUMIDITY</th>
                    <th>PRESSURE</th>
                    <th>AQI</th>
                    <th>STATUS</th>
                    <th>TREND (24h)</th>
                </tr>
            </thead>
            <tbody id="sensorTable">
            </tbody>
        </table>
        
        <footer>
            <div>
                <span class="nav-key">[F1]</span><span class="nav-hint"> Detail View</span>
                <span class="nav-key" style="margin-left: 20px;">[F2]</span><span class="nav-hint"> Export CSV</span>
            </div>
            <div class="nav-hint">AUTO-REFRESH: 5s | LAST UPDATE: <span id="lastUpdate">21:52:15</span></div>
        </footer>
    </div>
    
    <script>
        const sensors = [
            { id: 'SPORE-01', callsign: 'Nexus', temp: 6.4, humidity: 87, pressure: 1013, aqi: 12 },
            { id: 'RHIZOME-02', callsign: 'Ravine Stream', temp: 6.3, humidity: 69, pressure: 1007, aqi: 8 },
            { id: 'RHIZOME-03', callsign: 'Ridge Overlook', temp: 18.2, humidity: 45, pressure: 1015, aqi: 15 },
            { id: 'RHIZOME-08', callsign: 'Valley Floor', temp: 7.1, humidity: 82, pressure: 1011, aqi: 10 },
            { id: 'RHIZOME-12', callsign: 'Storm Watch', temp: 5.8, humidity: 91, pressure: 1009, aqi: 7 },
            { id: 'RHIZOME-15', callsign: 'Treeline', temp: 4.2, humidity: 78, pressure: 1012, aqi: 9 }
        ];
        
        function getStatusClass(temp, humidity) {
            if (temp > 15 || humidity > 90) return 'critical';
            if (temp > 10 || humidity > 85) return 'warning';
            if (temp > 5) return 'good';
            return 'excellent';
        }
        
        function getStatusWidth(temp, humidity) {
            const score = 100 - (Math.abs(temp - 7) * 5 + Math.abs(humidity - 75));
            return Math.max(20, Math.min(100, score));
        }
        
        function drawSparkline(canvas, data) {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            
            ctx.strokeStyle = '#50D8D7';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            
            data.forEach((value, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((value - min) / range) * height;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
        }
        
        function generateTrendData() {
            const data = [];
            let value = 5 + Math.random() * 3;
            for (let i = 0; i < 24; i++) {
                value += (Math.random() - 0.5) * 0.5;
                data.push(value);
            }
            return data;
        }
        
        function renderTable() {
            const tbody = document.getElementById('sensorTable');
            tbody.innerHTML = '';
            
            sensors.forEach(sensor => {
                const row = document.createElement('tr');
                const statusClass = getStatusClass(sensor.temp, sensor.humidity);
                const statusWidth = getStatusWidth(sensor.temp, sensor.humidity);
                
                row.innerHTML = `
                    <td>
                        <div class="node-id">${sensor.id}</div>
                        <div class="callsign">// "${sensor.callsign}"</div>
                    </td>
                    <td class="temp">${sensor.temp.toFixed(1)}°C</td>
                    <td class="humidity">${sensor.humidity}%</td>
                    <td class="pressure">${sensor.pressure} mb</td>
                    <td class="aqi">&lt;${sensor.aqi}</td>
                    <td>
                        <div class="status-bar">
                            <div class="status-fill ${statusClass}" style="width: ${statusWidth}%"></div>
                        </div>
                    </td>
                    <td>
                        <canvas class="sparkline" width="80" height="30"></canvas>
                    </td>
                `;
                
                tbody.appendChild(row);
                
                // Draw sparkline
                const canvas = row.querySelector('.sparkline');
                drawSparkline(canvas, generateTrendData());
            });
            
            // Show alert for RHIZOME-03
            if (sensors[2].temp > 15) {
                document.getElementById('alert').style.display = 'block';
            }
        }
        
        function updateValues() {
            sensors.forEach(sensor => {
                sensor.temp += (Math.random() - 0.5) * 0.2;
                sensor.humidity += Math.floor((Math.random() - 0.5) * 3);
                sensor.pressure += Math.floor((Math.random() - 0.5) * 2);
                
                sensor.temp = Math.max(-10, Math.min(30, sensor.temp));
                sensor.humidity = Math.max(0, Math.min(100, sensor.humidity));
                sensor.pressure = Math.max(990, Math.min(1030, sensor.pressure));
            });
            
            renderTable();
            
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                now.toTimeString().split(' ')[0];
        }
        
        // Update timestamp
        setInterval(() => {
            const now = new Date();
            document.getElementById('timestamp').textContent = 
                now.toTimeString().split(' ')[0];
        }, 1000);
        
        // Update sensor values
        renderTable();
        setInterval(updateValues, 5000);
    </script>
</body>
</html>
