
<style>
*{box-sizing:border-box;margin:0;padding:0}
#root{background:#0E0B02;font-family:'Courier New',monospace;user-select:none}
.hdr{display:flex;align-items:center;padding:4px 10px;background:#060400;border-bottom:1.5px solid #C47A00;height:28px;gap:6px}
.logo{color:#FFB800;font-size:14px;letter-spacing:3px;font-weight:700}
.htitle{color:#E88A00;font-size:12px;flex:1;letter-spacing:.5px}
.hstat{font-size:11px}
.hclk{color:#E88A00;font-size:11px;background:#120900;padding:1px 6px;border:1px solid #C47A00}
.tabs{display:flex;flex-wrap:wrap;gap:2px;padding:3px 6px;background:#060400;border-bottom:1px solid #251800}
.tab{background:#060400;color:#7A5800;border:1px solid #251800;font-family:'Courier New',monospace;font-size:11px;padding:3px 9px;cursor:pointer;letter-spacing:.3px;white-space:nowrap}
.tab:hover{color:#FFB800;border-color:#C47A00}
.tab.on{color:#FFB800;border-color:#FFB800;background:#130A00}
.cwrap{line-height:0;background:#060400}
.cwrap canvas{display:block;width:100%}
.ftr{display:flex;padding:3px 8px;border-top:1px solid #251800;background:#060400;align-items:center;gap:2px;min-height:22px}
.fb{background:none;border:none;color:#C47A00;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;padding:0 5px}
.fb:hover{color:#FFB800}
.pn{color:#7A5800}
.dv{color:#251800;font-size:10px}
</style>
